<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Karla:ital,wght@0,200..800;1,200..800&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet">
   <link rel="stylesheet" href="css/app.css">
   <title>Dashboard</title>
</head>

<body>
   <div class="wrapper">

      <header class="header">
         <div class="header__container">

            <div class="header__logo">
               <a href="dashboard.html" class="header__logo-brand">
                  <span class="header__logo-img">
                     <img src="/img/header/logo.svg" alt="FitTrack logo">
                  </span>
                  <span class="header__logo-title">FitTrack</span>
               </a>

               <nav class="header__nav">
                  <button class="header__burger" id="burgerButton" type="button" aria-label="Open menu"
                     aria-expanded="false" aria-controls="sidebarMenu">
                     <span></span>
                     <span></span>
                     <span></span>
                  </button>

                  <a href="#" class="header__logout" id="logoutButton" aria-label="Logout">
                     <img src="/img/header/logout.svg" alt="">
                  </a>
               </nav>
            </div>

         </div>
      </header>

      <div class="sidebar-overlay" id="sidebarOverlay"></div>

      <div class="page-layout">

         <aside class="sidebar" id="sidebarMenu">

            <div class="sidebar__card">

               <div class="sidebar__profile-card">

                  <div class="profile-card__header">
                     <div class="profile-card__avatar">
                        <img id="profileAvatar" src="" alt="">
                     </div>
                  </div>

                  <div class="profile-card__info">

                     <h2 class="profile-card__name" id="profileName">
                        Loading...
                     </h2>

                     <p class="profile-card__meta" id="profileMeta">
                        Loading...
                     </p>

                  </div>

                  <div class="profile-card__stats">

                     <div class="profile-card__stat">
                        <span class="profile-card__label">Height</span>

                        <span class="profile-card__value">
                           <strong id="profileHeight">--</strong> cm
                        </span>
                     </div>

                     <div class="profile-card__stat">
                        <span class="profile-card__label">Weight</span>

                        <span class="profile-card__value">
                           <strong id="profileWeight">--</strong> kg
                        </span>
                     </div>

                  </div>

               </div>
            </div>

            <nav class="menu">

               <a href="dashboard.html" class="menu__item menu__item--active">
                  <span class="menu__icon">
                     <img src="/img/sidebar/Home.svg" alt="">
                  </span>
                  <span class="menu__text">Home</span>
               </a>

               <a href="workouts.html" class="menu__item">
                  <span class="menu__icon">
                     <img src="/img/sidebar/training.svg" alt="">
                  </span>
                  <span class="menu__text">All trainings</span>
               </a>

               <a href="statistics.html" class="menu__item">
                  <span class="menu__icon">
                     <img src="/img/sidebar/Statistics.svg" alt="">
                  </span>
                  <span class="menu__text">Statistics</span>
               </a>

               <a href="subscription.html" class="menu__item">
                  <span class="menu__icon">
                     <img src="/img/sidebar/Sub.svg" alt="">
                  </span>
                  <span class="menu__text">Subscription</span>
               </a>

               <a href="settings.html" class="menu__item">
                  <span class="menu__icon">
                     <img src="/img/sidebar/Settings.svg" alt="">
                  </span>
                  <span class="menu__text">Settings</span>
               </a>

            </nav>
         </aside>

         <main class="dashboard-content">
            <section class="dashboard-hero">
               <h1 class="dashboard-hero__title" id="dashboardGreeting">
                  Hello!
               </h1>
               <p class="dashboard-hero__subtitle" id="dashboardSubtitle">
                  How about a workout?
               </p>
            </section>

            <section class="weekly-training">
               <div class="weekly-training__header">
                  <h2 class="weekly-training__title">Weekly Training</h2>
                  <p class="weekly-training__streak" id="currentStreak">
                     Current streak: --
                  </p>
               </div>

               <div class="weekly-training__track">
                  <div class="weekly-training__list" id="weeklyTrainingList"></div>
               </div>
            </section>

            <section class="today-workout">
               <h2 class="today-workout__title">Today’s workout</h2>

               <div class="today-workout__body">
                  <div class="today-workout__card">
                     <h3 class="today-workout__name" id="todayWorkoutName">
                        Loading...
                     </h3>
                     <p class="today-workout__weight" id="todayWorkoutWeight">
                        Loading...
                     </p>
                     <a href="#" class="today-workout__button" id="todayWorkoutButton">
                        Start Workout
                     </a>
                  </div>

                  <div class="today-workout__image">
                     <img id="todayWorkoutImage" src="/img/dashboard/bench-press.jpg" alt="Workout">
                  </div>
               </div>
            </section>

            <section class="dashboard-bottom">

               <div class="progress-card">

                  <h2 class="progress-card__title">
                     Progress Chart
                  </h2>

                  <div class="progress-card__chart">
                     <canvas id="progressChart"></canvas>
                  </div>

               </div>

               <div class="sessions-card">

                  <div class="sessions-card__header">

                     <h2 class="sessions-card__title">
                        Recent Sessions
                     </h2>

                     <a href="#" class="sessions-card__link">
                        View All
                     </a>

                  </div>

                  <div class="sessions-card__list" id="recentSessionsList">

                  </div>

               </div>

            </section>
         </main>
      </div>

   </div>

   <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
   <script src="./js/config/config.js"></script>
   <script src="./js/config/api.js"></script>
   <script src="./js/auth/auth-guard.js"></script>
   <script src="./js/sidebar.js"></script>
   <script src="./js/burger-menu.js"></script>
   <script src="./js/dashboard.js"></script>
   <script src="./js/auth/logout.js"></script>

</body>

</html>
